name: Daily refresh

on:
  schedule:
    # 06:00 UTC = 11:30 IST. Gives the morning's news a few hours to land first.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci

      - name: Write today's article(s)
        working-directory: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run pipeline -- article

      # Heavier-cadence data — tournament schedule, player profiles, featured
      # event storyline. Lives here (not on the 6h cron) because it changes
      # tournament-by-tournament, not hour-by-hour, and to stay within
      # Gemini's free-tier daily request budget.
      - name: Refresh schedule + profiles + featured
        if: always()
        working-directory: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run pipeline -- daily || echo "daily refresh failed — keeping last-good JSON"

      - name: Commit if changed
        if: always()
        run: |
          git config user.name "smash-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/*.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
