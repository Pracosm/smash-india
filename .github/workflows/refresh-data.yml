name: Refresh data

on:
  schedule:
    # Every 6 hours, on the hour.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci

      - name: Run pipeline
        working-directory: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run pipeline -- all

      # Re-write articles.json so every current news headline has a matching
      # full editorial. Without this, clicking a fresh-scraped headline lands
      # on a stub page (synthesised from summary). Runs regardless of upstream
      # failures so a transient news 503 doesn't lose article coverage.
      - name: Backfill articles for current news
        if: always()
        working-directory: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run pipeline -- articles-all || echo "articles-all failed — keeping last-good articles.json"

      # Commit any partial success — if news fails (transient Gemini 503) but
      # schedule succeeds, we still want the schedule update on the site.
      - name: Commit if changed
        if: always()
        run: |
          git config user.name "smash-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/*.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
