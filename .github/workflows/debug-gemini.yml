name: Debug Gemini key

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect secret length + first/last byte hash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "key length is ${#GEMINI_API_KEY}"
          echo "starts with: $(echo -n "$GEMINI_API_KEY" | head -c 4)"
          echo "ends with: $(echo -n "$GEMINI_API_KEY" | tail -c 4)"
          echo "sha256 (proves whether the secret matches what's expected without leaking it):"
          echo -n "$GEMINI_API_KEY" | sha256sum

      - name: Direct Gemini API probe (raw curl)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "--- HTTP code only ---"
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"contents":[{"parts":[{"text":"hi"}]}]}')
          echo "HTTP $code"
          echo "--- response body ---"
          cat /tmp/resp.json
